  ###########################################################################
  # Notes
  ###########################################################################

  - key: blocks.gender.note
    t: |
      Jika anda ingin mempelajari lebih lanjut, kami [menulis sebuah blog](https://dev.to/sachagreif/is-our-survey-biased-against-women-49oj) yang menjelaskan dinamika gender dari survei ini.  

  - key: blocks.source.note
    t: >

      Bagan ini mengumpulkan sekumpulan referrer, parameter URL, dan jawaban bebas. 

      - State of JS: milis [State of JS](https://stateofjs.com).

      - State of CSS: milis State of CSS; juga mencocokan `email`, `by email`, dll.

      - Work: mencocokkan `work`, `colleagues`, `coworkers`, dll.

  ###########################################################################
  # Awards
  ###########################################################################

  - key: award.feature_adoption_delta_award.comment
    t: Dengan nilai progresi sebesar **{value}** pada 2022, **top-level await** dengan cepat menjadi bagian penting dalam JavaScript.

  - key: award.tool_usage_delta_award.comment
    t: |
      Setia dengan namanya, **Vite** terus berkembang dengan ritme yang mencetak rekor, menambah **{value}** dalam penggunaan tahun demi tahun!

  - key: award.tool_satisfaction_award.comment
    t: Vitest meraih posisi pertama, dengan **{value}** pengembang yang akan menggunakannya lagi!

  - key: award.tool_interest_award.comment
    t: Masih dalam ekosistem Vite, tahun ini **Rolldown** menjadi teknologi yang paling diminati oleh para pengembang dengan rasio ketertarikan sebesar **{value}**.

  - key: award.most_write_ins_award.comment
    t: Dengan **{value}** penyebutan, Angular meta-framework **Analog** adalah pustaka yang menerima pilihan bebas terbanyak dari responden.

  - key: award.most_commented_tool_award.comment
    t: Angular mungkin bukan pemain baru, tapi masih menjadi perbincangan dengan **{value}** komentar dari responden!

  - key: award.most_loved_tool_award.comment
    t: Dengan pendapat positif sebanyak **{value}** dari pengembang, Vite sekali lagi mendapat peringkat pertama dalam teknologi yang paling dicintai!

  ###########################################################################
  # Conclusion
  ###########################################################################

  - key: conclusion.js2024.fernando_herrera
    t: |
      <span class="first-line">Beberapa tahun lalu, survei State of JS  lain membuatku tertarik dengan Astro.</span>

      Aku memutuskan untuk mencobanya dan setelah menghabiskan beberapa jam, aku jatuh cinta dengan teknologi ini. Rasanya seperti cinta pada pandangan pertama! Tanpa sadar, Aku melihat diriku membuat ulang halaman webku sendiri, alat administrasi, dan proyek lainnya dengan Astro. Sekarang, aku bisa bilang bahwa Astro adalah kerangka kerja kesukaanku saat ini.

      JavaScript itu ekosistem dinamis dan menarik yang terus berkembang dengan begitu banyak pustaka dan kerangka kerja. Dari komponen yang dapat digunakan kembali hingga sisi client, sisi server, dan solusi statis, begitu banyak cara untuk mencapai tujuanmu dengan Vanilla JavaScript, community package, pustaka, atau kerangka kerja yang masing-masing menawarkan kesempatan baru untuk berinovasi. Tentunya, itu mungkin bisa terasa berlebihan, tapi perbedaan inilah yang membuat JavaScript begitu hebat, memberimu begitu banyak opsi cerdas untuk mencapai tujuanmu.

      Jangan takut untuk terjun dan bereksperimen dengan tool yang berbeda meskipun itu adalah Vitest atau Jest, React atau Solid, Node atau Deno, Next.js atau Astro - atau bahkan sesuatu yang sangat berbeda seperti [Brisa](https://brisa.build/). 

      Terus mencari tahu, karena tidak ada bahasa pemrograman yang menawarkan komunitas, fleksibilitas, dan kreatifitas yang ditawarkan JavaScript!

  - key: conclusion.js2024.fernando_herrera.bio
    t: Pengembang, pengajar, dan YouTuber

  - key: conclusion.js2024.shaundai_person
    t: |
      <span class="first-line">Kurang dari lima tahun lalu, saya menemukan kelebihan dalam penggunaan TypeScript untuk pertama kalinya.</span>

      Saya tidak sendirian dalam perjalanan ini; Saya adalah bagian dari banyaknya pengembang JavaScript yang baru mulai mempelajari TypeScript beserta kelebihannya untuk tim yang ingin menciptakan sistem front-end yang dapat berkembang dan dapat dipelihara. Yang membuatku kagum adalah betapa cepatnya perkembangan kepopuleran TypeScript! Aku senang melihat sebagian besar responden telah menggunakan TypeScript dalam pekerjaan sehari-hari mereka.

      Saat ini, stack pilihanku untuk pekerjaan dan juga proyek pribadi adalah React, TypeScript, Vite, dan Jest. Tim besar dan yang berkembang dengan cepat telah bertaruh menggunakan tool ini dan carilah ahli dari area ini saat kamu sedang merekrut pengembang front-end. Jadi tidak heran jika mereka telah diadopsi secara luas dan bahkan dipertahankan oleh organisasi lain.

      Jika kamu sepertiku, kamu lebih memilih fokus untuk menguasai sedikit tool yang esensial ketimbang terus-menerus bereksperimen dengan kerangka kerja dan pustaka baru. Dan bagi saya, sebaiknya kamu tidak mengadopsi versi terbaru dari tool front-end hingga mereka mencapai rilisan yang stabil dan isu yang ada telah diselesaikan. Kamu tidak sendirian, dan ada begitu banyak keuntungan untuk mereka yang memilih jalan yang sudah teruji.

  - key: conclusion.js2024.shaundai_person.bio
    t: Front end Senior Software Engineer (Netflix) dan instruktor kursus

  ###########################################################################
  # Picks
  ###########################################################################

  - key: picks.my_pick
    t: "Pilihan 2024 Saya: "
  - key: picks.intro
    t: Kami meminta anggota dari komunitas JavaScript untuk membagikan “pilihan tahun ini” mereka

  - key: picks.jack_herrington.name
    t: TanStack
  - key: picks.jack_herrington.bio
    t: Coder & YouTuber
  - key: picks.jack_herrington.description
    t: |
      Tanstack, sebuah perpaduan pustaka yang praktis, berkualitas, teruji, semua itu ada pada kerangka kerja TanStack Start.

  - key: picks.josefine_schaefer.name
    t: Arisa Fukuzaki
  - key: picks.josefine_schaefer.bio
    t: Insinyur Aksesibilitas
  - key: picks.josefine_schaefer.description
    t: |
      Arisa adalah pengajar teknologi yang hebat, mentor, docs & DevRel engineer yang sangat bergairah dengan kerangka kerja Javascript, kegiatan komunitas dan mendukung perempuan dalam bidang teknologi. Dia patut dicontoh!

  - key: picks.cassie_evans.name
    t: gsap-video-export
  - key: picks.cassie_evans.bio
    t: Melakukan banyak hal dengan GSAP
  - key: picks.cassie_evans.description
    t: |
      Chris membuat tool serbaguna untuk mengekspor animasi GSAP menjadi video. Tool ini sangat mempermudah dan videoku menjadi jauh lebih halus - tidak ada lagi rekaman video berkualitas rendah!

  - key: picks.tania_rascia.name
    t: Cassidy Williams
  - key: picks.tania_rascia.bio
    t: principal engineer otodidak, blogger teknologi ternama, dan koki profesional
  - key: picks.tania_rascia.description
    t: |
      Cassidy telah menulis blognya semenjak 2009, menulis dengan gaya yang sangat unik, keren, dan menarik (Saya bangga mendapatkan keyboard copy/paste StackOverflow miliknya!). Dia merilis artikel yang luar biasa setiap minggunya, menciptakan meme pengembang terbaik, dan melakukan semua itu selagi menjadi seorang ibu, yang membuatnya jadi lebih luar biasa lagi.

  - key: picks.salma_alam_naylor.name
    t: The Breedling
  - key: picks.salma_alam_naylor.bio
    t: Live streamer, software engineer, dan edukator pengembang
  - key: picks.salma_alam_naylor.description
    t: |
      Teknologi Web bukan hanya untuk situs web. The Breedling adalah sebuah tool visualisasi yang berada di dalam peramban untuk menemani pertunjukan musik secara langsung oleh band dengan nama yang sama, menggabungkan video dan animasi RIVE dengan memakai WebGL shaders, memanfaatkan sebuah pustaka lama dari BBC yaitu VideoContext.

  - key: picks.wes_bos.name
    t: Transformers.js
  - key: picks.wes_bos.bio
    t: Podcaster dan edukator
  - key: picks.wes_bos.description
    t: |
      Transformers.js adalah sebuah pustaka untuk mengerjakan model AI dengan JavaScript. pustaka ini bisa melakukan segalanya - mulai dari Visi komputer, audio, pembuatan gambar, pembuatan chat-bot, dan banyak lagi.

      Pustaka ini berjalan di peramban, dengan menggunakan WASM atau WebGPU, dan pada server dengan Node.js, Bun atau Deno. Menjalankan model AI pada sebuah perangkat itu sangat menakjubkan, dan pustaka ini membolehkan kita memulai tanpa perlu repot dan bahkan menjalankan Python.

  - key: picks.shaundai_person.name
    t: Shruti Kapoor
  - key: picks.shaundai_person.bio
    t: Front end Senior Software Engineer (Netflix) dan course instructor
  - key: picks.shaundai_person.description
    t: |
      Pilihanku untuk tahun ini adalah temanku Shruti Kapoor. Shruti memiliki cara untuk menjelaskan konsep teknis dalam Javascript dengan bahasa yang sangat amat mudah untuk dipahami. Dalam video Youtube-nya yang seru dan menarik, dan juga pada pembicaraan konferensi, dia mengajarkan audiennya bagian penting dalam Javascript secara akurat.

  - key: picks.michelle_bakels.name
    t: v0
  - key: picks.michelle_bakels.bio
    t: Software developer, community builder, dan penyelenggara React Miami di G2i
  - key: picks.michelle_bakels.description
    t: |
      Meski sobat AI coding masih berada di sisi kita, mereka juga bisa mengalami kendala dalam mengikuti kemajuan dalam ekosistem pengembangan kita. v0 bukan hanya tool yang hebat dalam membuat UI, tetapi juga memiliki konteks yang kuat untuk menawarkan bantuan yang relevan dan berharga dalam kondisi Javascript saat ini.

  - key: picks.sacha_greif.name
    t: Bluesky
  - key: picks.sacha_greif.bio
    t: Maintainer, State of JS
  - key: picks.sacha_greif.description
    t: |
      Dengan X yang perlahan semakin kacau, rasanya komunitas front end telah ditinggalkan tanpa sebuah tempat tinggal. Jadi senang rasanya melihat banyak dari kita yang akhirnya pindah menuju platform baru dalam bentuk Bluesky.

  - key: picks.dominik_dorfmeister.name
    t: Knip
  - key: picks.dominik_dorfmeister.bio
    t: Software Engineer @ Sentry, React Query maintainer
  - key: picks.dominik_dorfmeister.description
    t: |
      Knip adalah tool hebat dalam menganalisa kode yang kamu buat dan memberitahu apa yang bisa kamu buang. Itu sangat cepat (kamu bisa menjalankannya dengan CI), sudah mengerti banyak kerangka kerja dan pustaka, dan juga dapat bekerja dengan baik dalam monorepo.

  - key: picks.sebastien_lorber.name
    t: Rspack
  - key: picks.sebastien_lorber.bio
    t: Pencipta This Week In React, Docusaurus maintainer
  - key: picks.sebastien_lorber.description
    t: |
      Rspack bundler adalah tool yang dibuat untuk menggantikan Webpack. Dibuat dengan Rust, tool ini jauh lebih cepat dari Webpack dan menggunakan lebih sedikit memory. Semua proyek Webpack harus segera mencobanya, mengingat betapa mudahnya tool ini untuk di adopsi!

