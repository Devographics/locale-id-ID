locale: id-ID
translations:
  ###########################################################################
  # General
  ###########################################################################

  - key: general.results.description
    t: Edisi 2024 dari survei tahunan tentang tren-tren terkini di ekosistem JavaScript.

  ###########################################################################
  # Survey Intro
  ###########################################################################

  # JS 2023
  - key: general.js2024.survey_intro
    t: >
      Selagi kita sibuk menebak pustaka front-end mana yang sebaiknya kita pilih, JavaScript sendiri telah melalui tahap evolusi. 


      Proposal TC39 sedang menyebabkan ombak di dalam komunitas, sementara proposal yang lain sudah dalam tahapan implementasi oleh semua browser. Dan popularitas TypeScript membuatnya menjadi kandidat untuk implementasi native di masa depan nanti. 


      Yang pasti – meski JavaScript tahun 2024 masih terasa sama, bukan berarti kita akan mengatakan hal yang sama pada 5 tahun lagi.


      Hingga saat itu, Kamu dapat membantu memetakan jalur kami dengan berpartisipasi dalam survei State of JavaScript tahun ini!

  ###########################################################################
  # Survey FAQ
  ###########################################################################

  - key: faq.how_long_will_survey_take_js2024
    t: Butuh berapa lama untuk mengisi survei ini?
  - key: faq.how_long_will_survey_take_js2024.description
    t: >
      Tergantung dari jumlah pertanyaan yang anda jawab (semua pertanyaan boleh dilewati),
      mengisi survei ini akan memakan waktu sekitar 15-20 menit.

  - key: faq.survey_design_js2024
    t: Bagaimana survei ini dirancang?
  - key: faq.survey_design_js2024.description
    t: >
      Survei ini dirancang sebagai hasil dari [proses rancangan terbuka](https://github.com/Devographics/surveys/issues/252) yang melibatkan vendor-vendor dan komunitas pengembangan web.

  - key: faq.results_released_js2024
    t: Kapan hasilnya akan dirilis?
  - key: faq.results_released_js2024.description
    t: Survei ini akan berlangsung dari 13 November hingga 10 Desember 2024, dan hasil survei akan dirilis segera setelahnya.

  ###########################################################################
  # Introduction
  ###########################################################################

  - key: introduction.js2024
    t: |

      <span class="first-letter">M</span>ari kita renungkan sejenak akan sebuah fakta: 3 kerangka kerja teratas 2024 dirilis pada 10 tahun yang lalu. 

      Ketiga kerangka kerja tersebut memang terus berevolusi, dan pola kerja dari 2014 memang sudah terlihat antik. Tapi jika dilihat dari reputasi ekosistem JavaScript yang terus berubah secara cepat, rasanya agak menenangkan mengingat ada yang masih tidak berubah seperti dulu. 

      Bicara soal tidak berubah, Vite dan Vitest masih menapaki peringkat teratas pada setiap bagan dan menjadi ujung tombak dalam tool generasi baru yang mudah dan mutakhir. 

      Lalu – kami telah menambahkan beberapa **Metadata** tambahan yang memberikan informasi lebih dalam tentang responden survei dan bahkan tentang survei itu sendiri. Dan jangan lupa bahwa Anda dapat menambahkan variabel baru ini pada bagan lainnya dengan menggunakan **Query Builder**. 

      Karena semua sudah disebutkan, mari kita temukan apa yang telah disajikan JavaScript pada tahun ini!

      <span class="conclusion__byline">– Sacha Greif</span>

  ###########################################################################
  # Tshirt
  ###########################################################################

  - key: sections.tshirt.title
    t: Kaos

  - key: sections.tshirt.description
    t: |
      ## Dukung Survei ini Dengan Kaos State Of JavaScript 

      Di antara kualitas video yang buruk, kaset yang besar, dan harus memutar balik, tidak ada yang dapat dirindukan dari era VHS. Namun satu hal yang kami *rindukan* adalah visual 90an yang dulu menghiasi kaset VHS yang kosong. 

      Namun, berkat dari seniman bertalenta Christopher Kirk-Nielsen anda dapat menikmati semua kekerenan retro ini sambil juga merayakan kecintaan anda akan JavaScript dalam waktu yang bersamaan!

  - key: tshirt.about
    t: Tentang kaos ini

  - key: tshirt.description
    t: |
      Kami menggunakan kaos tri-blend berkualitas tinggi yang sangat lembut dengan bentuk ramping yang dicetak dari mitra kami di Cotton Bureau.

  - key: tshirt.getit
    t: Dapatkan

  - key: tshirt.price
    t: USD $32 + pengiriman

  - key: tshirt.designer.heading
    t: Tentang perancang kaos

  - key: tshirt.designer.name
    t: Christopher Kirk-Nielsen

  - key: tshirt.designer.bio
    t: |
      Berasal dari Prancis namun sekarang tinggal di Amerika Serikat, Chris bukan hanya seorang pengembang front-end yang menakjubkan, namun juga seorang ilustrator bertalenta dengan spesialisasi dalam bidang visual retro. Kami mendorong anda untuk melihat [desain kaos lainnya darinya](https://chriskirknielsen.com/designs)!

  ###########################################################################
  # Sections
  ###########################################################################

  - key: sections.user_info.description.js2024
    t: |
      Tahun ini, sebanyak **14,015** responden mengambil bagian dalam survei ini.


      Untuk pertama kalinya, pada tahun ini kita menambahkan poin-poin tambahan pada bagian demografis tentang jenis pekerjaan, untuk menguak informasi menarik tentang hubungan jenis pekerjaan dengan gaji, umur, dan jenis kelamin.
      

  - key: sections.features.description.js2024
    t: |
      Meski belum sering digunakan, fitur Set dan Object pada JavaScript akan membuat kebutuhan akan pustaka pihak-ketiga semakin berkurang.


      Selain itu, kami juga menampilkan [Status dasar]() jika tersedia: hijau untuk "tersedia secara luas", biru untuk "baru tersedia", dan putih untuk "tersedia terbatas".

  - key: sections.libraries.description.js2024
    t: |
      Meski ekosistem JavaScript masih sangat terfragmentasi, tapi senang bisa melihat bahwa pustaka yang paling banyak dipakai adalah pustaka yang paling disukai.


      Pastikan kamu menjelajahi opsi grouping dan sorting terbaru kami untuk mencari tahu pustaka mana yang paling disukai… bahkan yang tidak disukai!

  - key: sections.other_tools.description.js2024
    t: |
      Tahun ini tool AI melakukan debutnya dalam survei, dan meski masih didominasi oleh pemain lama, tapi senang rasanya melihat begitu banyak opsi yang tersedia!

  - key: sections.usage.description.js2024
    t: |
      Survei tahun ini menggambarkan rata-rata responden yang menggunakan TypeScript, selalu menjalankan kode melalui langkah build, dan belum mengikuti tren AI.

  - key: sections.resources.description.js2024
    t: |
      Meski tidak ada kekurangan kursus, podcast, dan surat kabar yang bagus, konten video masih terus menguasai konten JavaScript.


      Ekosistem konten berbahasa Spanyol layak untuk disorot sebagai lawan yang sepadan dengan dominasi konten berbahasa Inggris di dalam dunia programming.

  - key: sections.awards.description.js2024
    t: |
      Seberapa *cepat* anda bisa menebak proyek mana yang akan meraih posisi pertama dalam setiap kategori?

